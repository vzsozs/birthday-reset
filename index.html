<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Project: Birthday Reset</title>
<link rel="stylesheet" href="style.css?v=79" />
</head>
<body>

<div id="game-viewport">
  <div id="scene-fade"></div>
  <div id="game-stage">

    <div id="title-screen" class="screen">
      <h1>PROJECT: BIRTHDAY RESET</h1>
      <p class="subtitle">♡ Boldog szülinapot Töki ♡</p>
      <button id="start-btn" class="pixel-btn">KATTINTS A KEZDÉSHEZ</button>
    </div>

    <div id="overworld-screen" class="screen hidden">
      <div id="overworld-stage">
        <div id="overworld-world">
          <img id="overworld-bg" src="" alt="" />
          <div id="overworld-npcs"></div>
          <div id="overworld-player"><img src="assets/sprites/Bazsa_placeholder_down.png" alt="" /></div>
        </div>
        <div id="overworld-prompt" class="hidden">▶ Enter</div>

        <div id="computer-choice-box" class="hidden">
          <div id="choice-text"></div>
          <div id="choice-buttons">
            <button id="choice-start" class="choice-option">
              <img class="choice-heart" src="assets/sprites/ui/soul_heart_red.png" alt="" />
              <span class="choice-label">Bekapcsolom a gépet</span>
            </button>
            <button id="choice-dad" class="choice-option">
              <img class="choice-heart" src="assets/sprites/ui/soul_heart_red.png" alt="" />
              <span class="choice-label">Inkább kimegyek apához</span>
            </button>
          </div>
        </div>

        <div id="corner-popup" class="hidden">
          <img id="corner-popup-portrait" src="" alt="" class="hidden" />
          <div id="corner-popup-text"></div>
        </div>

        <div id="gift-countdown-box" class="hidden">
          <div id="gift-countdown-number">32</div>
          <button id="gift-countdown-button" class="pixel-btn">MEGVAN!</button>
        </div>

        <img id="overworld-image-flash" src="" alt="" class="hidden" />
        <div id="overworld-style-tag"></div>
        <div id="overworld-ending-overlay">
          <div id="overworld-ending-heading"></div>
          <div id="overworld-ending-final-line"></div>
          <div id="overworld-ending-continue-hint">▶ kattints / szóköz</div>
          <img id="overworld-ending-guy" src="" alt="" />
        </div>

        <div id="overworld-dialogue-box" class="hidden">
          <img id="overworld-portrait" src="" alt="" />
          <div id="overworld-dialogue-text-wrap">
            <div id="overworld-speaker-name"></div>
            <div id="overworld-dialogue-text"></div>
            <div id="overworld-continue-hint">▶ kattints / szóköz</div>
          </div>
        </div>
      </div>
      <!-- Csak a Bazsa-szobaban lathato -- a felhasznalo kerese szerint a
           tobbi jelenetbol (folyoso, isaac-szoba) mar leszedve. JS-ben
           toggle-olva (ld. main.js roomHint), ld. enterGlitchWorld(). -->
      <p id="room-hint" class="hint-small">Mozgás: nyilak / WASD · Interakció: Enter / szóköz / kattintás</p>
    </div>

    <div id="game-screen" class="screen hidden">
      <div id="battle-stage">
        <img id="zone-bg" src="" alt="" />

        <img id="battle-enemy-sprite" src="" alt="" class="hidden" />

        <img id="battle-image-flash" src="" alt="" class="hidden" />

        <div id="hp-row">
          <span id="hp-text">HP 5 / 5</span>
          <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>

        <div id="mercy-row" class="hidden">
          <span id="mercy-text">SPARE 0%</span>
          <div id="mercy-bar"><div id="mercy-fill"></div></div>
        </div>

        <div id="battle-wrap">
          <canvas id="battle-canvas" width="480" height="300"></canvas>
        </div>

        <div id="menu-box"></div>

        <div id="battle-corner-popup" class="hidden">
          <img id="battle-corner-popup-portrait" src="" alt="" class="hidden" />
          <div id="battle-corner-popup-text"></div>
        </div>

        <div id="dialogue-box">
          <img id="portrait" src="" alt="" />
          <div id="dialogue-text-wrap">
            <div id="speaker-name"></div>
            <div id="dialogue-text"></div>
            <div id="continue-hint">▶ kattints / szóköz</div>
          </div>
        </div>

        <div id="style-tag"></div>

        <div id="gameover-overlay" class="hidden">
          <img src="assets/UI/Game Over.png" alt="" />
        </div>

        <div id="ending-overlay">
          <div id="ending-heading"></div>
          <div id="ending-final-line"></div>
          <div id="ending-continue-hint">▶ kattints / szóköz</div>
          <img id="ending-guy" src="" alt="" />
        </div>
      </div>
    </div>

    <div id="end-screen" class="screen hidden">
      <h1>HAPPY 13TH BIRTHDAY!</h1>
      <p class="subtitle">Project: Birthday Reset — Complete.</p>
      <button id="restart-btn" class="pixel-btn">ÚJRA A CÍMKÉPERNYŐRE</button>
    </div>

  </div>

  <!-- Mobil erintos iranyitas -- csak erintokepes eszkozon jelenik meg
       (js/mobile-controls.js allitja be a <html class="touch-device">-t).
       Szandekosan a #game-stage-en KIVUL, kozvetlenul a #game-viewport
       gyereke: position:fixed-del a teljes kepernyohoz kepest pozicionalt,
       fuggetlenul a #game-stage belso 800x640-es skalazasatol/letterboxjatol
       -- ld. style.css. Nem kuld sajat mozgas-/interakcio-logikat, csak
       szintetikus KeyboardEvent-eket general a window-ra (nyilak + Enter),
       amit MINDEN meglevo billentyu-figyelo (overworld.js, engine.js dodge-
       fazis, battle.js ACT-menu/dialogus-lapozas, main.js valaszto-dobozok)
       mar amugy is figyel -- ld. js/mobile-controls.js. -->
  <div id="mobile-joystick">
    <div id="mobile-joystick-knob"></div>
  </div>
  <button id="mobile-enter-btn" type="button">ENTER</button>
</div>

<script src="js/engine.js?v=79"></script>
<script src="js/battle.js?v=79"></script>
<script src="js/overworld.js?v=79"></script>
<script src="js/zones.js?v=79"></script>
<script src="js/main.js?v=79"></script>
<script src="js/mobile-controls.js?v=79"></script>

</body>
</html>
